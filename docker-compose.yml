# HHIO — https://github.com/extremeshannon/HHIO
# Static site (nginx) + small FastAPI API (/health, /health/db, /docs).
#
# Web listens on 0.0.0.0:8003 (all interfaces). Open firewall on VPS, e.g.:
#   sudo ufw allow 8003/tcp && sudo ufw reload
#   (or cloud security group: inbound TCP 8003)
#
# Local:  http://127.0.0.1:8003/   Public: http://YOUR_SERVER_IP:8003/
# Loopback-only option: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
#
# Dev (site only; DB check fails until DB_* are set):
#   docker compose up -d --build
#
# Dev + MalfunctionDZ Postgres on host (platform-py publishes 5433):
#   cp .env.example .env   # set DB_HOST=host.docker.internal DB_PORT=5433
#   docker compose -f docker-compose.yml -f docker-compose.dev-db.yml up -d --build
#
# VPS + shared Docker Postgres (platform_py_db on network platform_platform):
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml -f docker-compose.prod.yml up -d --build

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: hhio_web
    ports:
      - "8003:80"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: hhio_api
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-platform}
      DB_USER: ${DB_USER:-platform}
      DB_PASS: ${DB_PASS:-platform}

networks:
  default:
    name: hhio_internal
